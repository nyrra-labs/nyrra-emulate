name: Deploy Cloudflare docs

on:
  pull_request:
    paths:
      - ".github/workflows/deploy-cloudflare.yml"
      - "apps/web-svelte/**"
      - "apps/web/**"
      - "packages/emulate/**"
      - "packages/@emulators/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.json"
      - "scripts/post-cloudflare-deployment-comment.mjs"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloudflare.yml"
      - "apps/web-svelte/**"
      - "apps/web/**"
      - "packages/emulate/**"
      - "packages/@emulators/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.json"
      - "scripts/post-cloudflare-deployment-comment.mjs"

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: deploy-cloudflare-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: FoundryCI docs
  APP_SLUG: foundryci-docs
  PRODUCTION_DOMAIN: foundryci.com
  WORKER_NAME: foundryci-docs

jobs:
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Upload preview version
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PREVIEW_ALIAS: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          output="$(pnpm --filter web-svelte deploy:preview 2>&1)"
          printf '%s\n' "$output"

          version_id="$(printf '%s\n' "$output" | sed -n 's/^Current Version ID: //p; s/^Version ID: //p' | tail -n 1)"
          subdomain_response="$(
            curl --fail --silent --show-error \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain"
          )"
          workers_subdomain="$(
            node -e 'const fs = require("node:fs"); const payload = JSON.parse(fs.readFileSync(0, "utf8")); console.log(payload.result.subdomain);' \
              <<<"$subdomain_response"
          )"
          preview_url="https://${PREVIEW_ALIAS}-${WORKER_NAME}.${workers_subdomain}.workers.dev"

          if [ -z "$preview_url" ]; then
            echo "Failed to determine preview URL" >&2
            exit 1
          fi

          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"
          echo "version_id=$version_id" >> "$GITHUB_OUTPUT"

      - name: Comment preview deployment on PR
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_SLUG: ${{ env.APP_SLUG }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.preview_url }}
          ENVIRONMENT: preview
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PROVIDER: cloudflare
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY: Preview deployment uploaded for this pull request.
          VERSION_ID: ${{ steps.deploy.outputs.version_id }}
        run: node scripts/post-cloudflare-deployment-comment.mjs

  production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy production Worker
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          output="$(pnpm --filter web-svelte deploy:production 2>&1)"
          printf '%s\n' "$output"

          version_id="$(printf '%s\n' "$output" | sed -n 's/^Current Version ID: //p; s/^Version ID: //p' | tail -n 1)"
          echo "version_id=$version_id" >> "$GITHUB_OUTPUT"

      - name: Comment production deployment on associated PR
        env:
          APP_NAME: ${{ env.APP_NAME }}
          APP_SLUG: ${{ env.APP_SLUG }}
          ENVIRONMENT: production
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCTION_URL: https://${{ env.PRODUCTION_DOMAIN }}
          PROVIDER: cloudflare
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY: Production deployment is live on the custom domain.
          VERSION_ID: ${{ steps.deploy.outputs.version_id }}
        run: node scripts/post-cloudflare-deployment-comment.mjs
